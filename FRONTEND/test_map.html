<!DOCTYPE html>
<html>
<head>
    <title>Test Google Maps</title>
    <style>
        #map {
            height: 400px;
            width: 100%;
            border: 2px solid #ccc;
            border-radius: 8px;
        }
        body {
            padding: 20px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Test Google Maps Loading</h1>
    <p>This tests if Google Maps loads correctly with the API key.</p>
    
    <div id="map"></div>
    
    <div id="status">Loading...</div>
    
    <script>
        const apiKey = "AIzaSyAED8PQOpKOu5WuwLYDjyWiMp5qZvAAxJk";
        
        function initMap() {
            const delhi = { lat: 28.6139, lng: 77.2090 };
            const map = new google.maps.Map(document.getElementById("map"), {
                center: delhi,
                zoom: 12,
            });
            
            new google.maps.Marker({
                position: delhi,
                map: map,
                title: "Delhi, India"
            });
            
            document.getElementById("status").innerHTML = "✅ Google Maps loaded successfully!";
        }
        
        function loadGoogleMaps() {
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&callback=initMap`;
            script.async = true;
            script.defer = true;
            
            script.onerror = function() {
                document.getElementById("status").innerHTML = "❌ Failed to load Google Maps. Check API key.";
            };
            
            document.head.appendChild(script);
        }
        
        // Load Google Maps
        loadGoogleMaps();
    </script>
</body>
</html>
